<!DOCTYPE html>
<html>
<head>
    <title>University Matching</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/config.js"></script>
</head>
<body>

<div class="navbar">
    <div class="logo">GlobalScholarAI</div>
    <div class="nav-links">
        <a href="../dashboard.html">Dashboard</a>
    </div>
</div>

<div class="container">

    <h1 class="page-title">University Matching</h1>

    <div class="card">
        <h3>Enter Your Details</h3>

        <label>GPA:</label>
        <input type="number" id="gpa" step="0.1" placeholder="e.g. 8.5">

        <label>IELTS Band:</label>
        <input type="number" id="ielts" step="0.5" placeholder="e.g. 7.0">

        <label>Preferred Country:</label>
        <select id="country">
            <option>UK</option>
            <option>Canada</option>
            <option>Australia</option>
            <option>Germany</option>
            <option>USA</option>
        </select>

        <br><br>

        <button class="btn-primary" onclick="matchUniversity()">Find Universities</button>
    </div>

    <div id="result-section" style="display:none;">
        <div class="card">
            <h3>Matching Result</h3>
            <div id="match-result"></div>
        </div>
    </div>

</div>

<script>

async function matchUniversity() {

    const gpa = document.getElementById("gpa").value;
    const ielts = document.getElementById("ielts").value;
    const country = document.getElementById("country").value;

    if (!gpa || !ielts) {
        alert("Please enter GPA and IELTS score.");
        return;
    }

    try {

        const response = await fetch(`${API_BASE}/match/universities`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                field: "Data Science",
                preferred_country: country,
                gpa: parseFloat(gpa),
                ielts: parseFloat(ielts)
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            alert("Server Error: " + errorText);
            return;
        }

        const result = await response.json();

        document.getElementById("result-section").style.display = "block";

        let universities = "";

        if (result.recommended_universities && result.recommended_universities.length > 0) {

            result.recommended_universities.forEach(u => {

                const name =
                    u.university_name ||
                    u.university ||
                    u.name ||
                    "Unknown University";

                const countryName =
                    u.country ||
                    "Unknown Country";

                const rank = u.world_rank || "N/A";
                const category = u.category || "Unknown";
                universities += `
                <li>
                <strong>${name}</strong><br>
                Country: ${countryName}<br>
                Rank: ${rank}<br>
                Category: ${category}
                </li>
                <br>
                `;
            });

        } else {

            universities = "<li>No universities found based on the given profile.</li>";

        }

        document.getElementById("match-result").innerHTML = `
            <p><strong>Suggested Universities:</strong></p>
            <ul>${universities}</ul>

            <p><strong>Application Strategy:</strong></p>
            <p>${result.strategy || "No strategy generated."}</p>
        `;

    } catch (error) {

        console.error(error);
        alert("Something went wrong while connecting to the server.");

    }

}

</script>

</body>
</html>
